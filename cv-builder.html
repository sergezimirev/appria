function PhotoCropper({ src, onDone, onCancel }) {
  const SIZE = 280;

    const ctx=c.getContext("2d");
    ctx.beginPath(); ctx.arc(130,130,130,0,Math.PI*2); ctx.clip();
    const im=new Image(); im.src=src;
    const r=260/SIZE;
    ctx.drawImage(im, pos.x*r, pos.y*r, img.w*scale*r, img.h*scale*r);
    onDone(c.toDataURL("image/jpeg",0.92));
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
      <div style={{background:"white",borderRadius:16,padding:28,maxWidth:380,width:"90%",textAlign:"center"}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:4,color:"#3a2a1e"}}>Foto positionieren</div>
        <div style={{fontSize:12,color:"#999",marginBottom:14}}>Ziehen · Mausrad zum Zoomen</div>
        <div style={{display:"inline-block",width:SIZE,height:SIZE,borderRadius:"50%",overflow:"hidden",border:"3px solid #7a5c4a",cursor:"grab",background:"#ccc",userSelect:"none"}}
          onMouseDown={onMD} onTouchStart={onTS} onWheel={onWh}>
          <img src={src} draggable={false} style={{position:"relative",left:pos.x,top:pos.y,width:img.w*scale,height:img.h*scale,pointerEvents:"none"}}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14}}>
          <span style={{fontSize:11,color:"#aaa"}}>−</span>
          <input type="range" min="0.3" max="5" step="0.01" value={scale}
            onChange={e=>{const ns=parseFloat(e.target.value);setScale(ns);setPos(p=>clamp(ns,p));}}
            style={{flex:1,accentColor:"#7a5c4a"}}/>
          <span style={{fontSize:11,color:"#aaa"}}>+</span>
        </div>
        <div style={{display:"flex",gap:10,marginTop:18,justifyContent:"center"}}>
          <button onClick={onCancel} style={{padding:"8px 18px",border:"1.5px solid #ccc",borderRadius:8,background:"white",cursor:"pointer",color:"#666",fontWeight:600}}>Abbrechen</button>
          <button onClick={apply} style={{padding:"8px 22px",border:"none",borderRadius:8,background:"#7a5c4a",color:"white",cursor:"pointer",fontWeight:700}}>✓ Übernehmen</button>
        </div>
      </div>
    </div>
  );
}

/* ── inline markdown: **bold**, *italic* ── */
function inlineMd(text) {
  const parts = [];
  const re = /(\*\*|__)(.*?)\1|(\*|_)(.*?)\3/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push(text.slice(last, m.index));
    if (m[1]) parts.push(<strong key={m.index}>{m[2]}</strong>);
    else       parts.push(<em key={m.index}>{m[4]}</em>);
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push(text.slice(last));
  return parts.length === 1 && typeof parts[0] === "string" ? parts[0] : parts;
}

/* ── block markdown renderer ── */
function renderMd(text) {
  if (!text) return null;
  const lines = text.split("\n");
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^### /.test(line)) {
      out.push(<div key={i} style={{fontWeight:700,fontSize:15,marginTop:10,marginBottom:3,color:TX}}>{inlineMd(line.slice(4))}</div>);
    } else if (/^## /.test(line)) {
      out.push(<div key={i} style={{fontWeight:700,fontSize:16,marginTop:12,marginBottom:4,color:TX}}>{inlineMd(line.slice(3))}</div>);
    } else if (/^# /.test(line)) {
      out.push(<div key={i} style={{fontWeight:700,fontSize:17,marginTop:14,marginBottom:6,color:TX}}>{inlineMd(line.slice(2))}</div>);
    } else if (/^[-*] /.test(line)) {
      const items = [];
      while (i < lines.length && /^[-*] /.test(lines[i])) {
        items.push(<li key={i} style={{marginBottom:3}}>{inlineMd(lines[i].slice(2))}</li>);
        i++;
      }
      out.push(<ul key={"ul"+i} style={{paddingLeft:20,margin:"4px 0 6px",listStyleType:"disc"}}>{items}</ul>);
      continue;
    } else if (/^\d+\. /.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\. /.test(lines[i])) {
        items.push(<li key={i} style={{marginBottom:3}}>{inlineMd(lines[i].replace(/^\d+\. /,""))}</li>);
        i++;
      }
      out.push(<ol key={"ol"+i} style={{paddingLeft:22,margin:"4px 0 6px"}}>{items}</ol>);
      continue;
    } else if (/^---+$/.test(line.trim())) {
      out.push(<hr key={i} style={{border:"none",borderTop:"1px solid rgba(0,0,0,0.15)",margin:"8px 0"}}/>);
    } else if (line.trim() === "") {
      out.push(<div key={i} style={{height:10}}/>);
    } else {
      out.push(<div key={i} style={{lineHeight:1.9,marginBottom:1}}>{inlineMd(line)}</div>);
    }
    i++;
  }
  return out;
}

/* ── FORM HELPERS ── */
const inp = {width:"100%",padding:"7px 10px",border:"1.5px solid #c9b8aa",borderRadius:6,fontSize:13,background:"#faf7f4",boxSizing:"border-box"};
function Sec({title,children}){return <div style={{marginBottom:20}}><div style={{fontWeight:700,fontSize:11.5,color:"#5d3d2a",borderBottom:"2px solid #e8ddd6",paddingBottom:5,marginBottom:12,textTransform:"uppercase",letterSpacing:0.6}}>{title}</div>{children}</div>;}
function Fld({label,children}){return <div style={{marginBottom:9}}><label style={{display:"block",fontSize:11.5,fontWeight:600,color:"#7a5c4a",marginBottom:3}}>{label}</label>{children}</div>;}
function ChkList({options,selected,onChange}){
  const toggle=o=>onChange(selected.includes(o)?selected.filter(x=>x!==o):[...selected,o]);
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 8px"}}>{options.map(o=>(
    <label key={o} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,cursor:"pointer",padding:"2px 0"}}>
      <input type="checkbox" checked={selected.includes(o)} onChange={()=>toggle(o)} style={{accentColor:"#7a5c4a",width:13,height:13}}/>
      <span style={{color:selected.includes(o)?"#3a1a08":"#7a5c4a"}}>{o}</span>
    </label>
  ))}</div>;
}

/* ── APP ── */
function App() {
  const [data, setData] = useState(DEFAULT);
  const [tab, setTab] = useState("form");
  const [cropSrc, setCropSrc] = useState(null);
  const fileRef = useRef();
  const set = (k,v) => setData(d=>({...d,[k]:v}));

  const handleFile = e => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=ev=>setCropSrc(ev.target.result); r.readAsDataURL(f);
    e.target.value="";
  };

  const handlePrint = () => {
    const cvEl = document.getElementById("cv-content");
    if (!cvEl) return;
    const html = cvEl.outerHTML;
    const w = window.open("","_blank");
    w.document.write('<!DOCTYPE html><html><head>' +
      '<meta charset="UTF-8"/>' +
      '<title>Lebenslauf</title>' +
      '<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">' +
      '<style>' +
      '*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }' +
      'html, body { width: 210mm; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }' +
      'body { font-family: "Montserrat", sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }' +
      '@page { margin: 0; size: A4 portrait; }' +
      '#cv-content { width: 210mm !important; max-width: 210mm !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }' +
      '* { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }' +
      'img { -webkit-print-color-adjust: exact; print-color-adjust: exact; }' +
      '</style></head>' +
      '<body style="-webkit-print-color-adjust:exact;print-color-adjust:exact;">' +
      html +
      '</body></html>');
    w.document.close();
    setTimeout(()=>{ w.focus(); w.print(); }, 1200);
  };

  const tabBtn = (t,lbl) => (
    <button onClick={()=>setTab(t)} style={{padding:"9px 22px",cursor:"pointer",fontWeight:600,fontSize:13,border:"none",
      background:tab===t?"#7a5c4a":"#d9cfc8",color:tab===t?"white":"#5d3d2a",borderRadius:"8px 8px 0 0"}}>
      {lbl}
    </button>
  );

  return (
    <div id="app-shell">
      {cropSrc && <PhotoCropper src={cropSrc} onDone={r=>{set("foto",r);setCropSrc(null);}} onCancel={()=>setCropSrc(null)}/>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#7a5c4a,#4a3020)",padding:"15px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{color:"white",fontWeight:700,fontSize:19}}>CV-Builder</div>
          <div style={{color:"rgba(255,255,255,0.65)",fontSize:12}}>Appria Seniorenbetreuung</div>
        </div>
        <button onClick={handlePrint} style={{background:"white",color:"#5d3d2a",border:"none",borderRadius:8,padding:"9px 20px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
          🖨️ Drucken / PDF
        </button>
      </div>

      {/* Tabs */}
      <div style={{padding:"12px 28px 0",background:"#d4c8be",display:"flex",gap:4}}>
        {tabBtn("form","✏️ Bearbeiten")}
        {tabBtn("preview","👁️ Vorschau")}
      </div>

      {/* Body */}
      <div style={{padding:28,display:tab==="form"?"grid":"flex",gridTemplateColumns:"1fr 1fr",gap:28,maxWidth:1400,margin:"0 auto"}}>

        {tab==="form" && (
          <div style={{background:"white",borderRadius:12,padding:24,boxShadow:"0 2px 16px rgba(0,0,0,0.08)",overflowY:"auto",maxHeight:"calc(100vh - 160px)"}}>

            <Sec title="Foto">
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                {data.foto && (
                  <div style={{position:"relative"}}>
                    <img src={data.foto} style={{width:64,height:64,borderRadius:"50%",objectFit:"cover",border:"2px solid #c9b8aa"}} alt=""/>
                    <button onClick={()=>setCropSrc(data.foto)} style={{position:"absolute",bottom:-2,right:-2,width:20,height:20,borderRadius:"50%",background:"#7a5c4a",border:"2px solid white",color:"white",cursor:"pointer",fontSize:10,padding:0}}>✎</button>
                  </div>
                )}
                <div>
                  <button onClick={()=>fileRef.current.click()} style={{background:"#f0e8e2",border:"1.5px solid #c9b8aa",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:13,color:"#5d3d2a",fontWeight:600}}>
                    📷 Foto hochladen
                  </button>
                  {data.foto && <button onClick={()=>set("foto",null)} style={{marginLeft:8,background:"none",border:"none",color:"#c0605a",cursor:"pointer",fontSize:12}}>✕</button>}
                  <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
                  <div style={{fontSize:11,color:"#aaa",marginTop:4}}>Ziehen + Mausrad zum Anpassen</div>
                </div>
              </div>
            </Sec>

            <Sec title="Persönliche Daten">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <Fld label="Anrede"><select value={data.anrede} onChange={e=>set("anrede",e.target.value)} style={inp}><option>Frau</option><option>Herr</option></select></Fld>
                <Fld label="Vorname"><input style={inp} value={data.vorname} onChange={e=>set("vorname",e.target.value)}/></Fld>
                <Fld label="Alter"><input style={inp} value={data.alter} onChange={e=>set("alter",e.target.value)}/></Fld>
                <Fld label="Groß/Gewicht"><input style={inp} value={data.groesseGewicht} onChange={e=>set("groesseGewicht",e.target.value)}/></Fld>
                <Fld label="Rauchen"><select value={data.rauchen} onChange={e=>set("rauchen",e.target.value)} style={inp}><option>Nein</option><option>Ja</option></select></Fld>
                <Fld label="Staatsangehörigkeit"><input style={inp} value={data.staatsan} onChange={e=>set("staatsan",e.target.value)}/></Fld>
                <Fld label="Kochen"><input style={inp} value={data.kochen} onChange={e=>set("kochen",e.target.value)}/></Fld>
                <Fld label="Deutschkenntnisse"><select value={data.deutschKenntnisse} onChange={e=>set("deutschKenntnisse",e.target.value)} style={inp}>{SPRACHEN.map(s=><option key={s}>{s}</option>)}</select></Fld>
              </div>
              <Fld label="Hobby (durch Komma)"><input style={inp} value={data.hobby} onChange={e=>set("hobby",e.target.value)}/></Fld>
            </Sec>

            <Sec title="Zusammenfassung">
              <textarea value={data.zusammenfassung} onChange={e=>set("zusammenfassung",e.target.value)}
                style={{...inp,height:160,resize:"vertical",lineHeight:1.6}}/>
            </Sec>

            <Sec title="Krankheiten">
              <ChkList options={KRANKHEITEN} selected={data.krankheiten} onChange={v=>set("krankheiten",v)}/>
            </Sec>

            <Sec title="Tätigkeiten">
              <ChkList options={TAETIGKEITEN} selected={data.taetigkeiten} onChange={v=>set("taetigkeiten",v)}/>
            </Sec>
          </div>
        )}

        {tab==="form" && (
          <div style={{position:"sticky",top:20,alignSelf:"flex-start",overflowY:"auto",maxHeight:"calc(100vh - 160px)"}}>
            <div style={{fontSize:11,color:"#aaa",marginBottom:6,textAlign:"center"}}>Live-Vorschau</div>
            <div style={{transform:"scale(0.76)",transformOrigin:"top center",marginBottom:-160}}>
              <CVPreview data={data}/>
            </div>
          </div>
        )}

        {tab==="preview" && (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,width:"100%"}}>
            <div style={{fontSize:12,color:"#aaa"}}>Zum Speichern: Schaltfläche oben rechts</div>
            <CVPreview data={data}/>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
